<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBLIVION Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 280px;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .popup-container {
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .header .badge {
      margin-left: auto;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.3);
      font-weight: 600;
    }

    /* Search Box */
    .search-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #64748b;
    }

    #searchInput {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: #141420;
      border: 1px solid #2d2d44;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    #searchInput::placeholder {
      color: #4a4a6a;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      flex: 1;
      background: #141420;
      border: 1px solid #1e1e32;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Quick Links */
    .quick-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #141420;
      border: 1px solid #1e1e32;
      border-radius: 8px;
      color: #c4b5fd;
      text-decoration: none;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .quick-link:hover {
      background: #1a1a2e;
      border-color: #8b5cf6;
    }

    .quick-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .quick-link span {
      flex: 1;
    }

    .quick-link .shortcut {
      font-size: 10px;
      color: #4a4a6a;
      font-family: monospace;
    }

    /* Footer */
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #3a3a5a;
    }

    .footer a {
      color: #7c3aed;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <img src="icons/icon-48.png" alt="OBLIVION">
      <h1>OBLIVION</h1>
      <span class="badge">PRIVATE</span>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search privately with OBLIVION..." autofocus>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="searchCount">0</div>
        <div class="stat-label">Private Searches</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="daysSince">0</div>
        <div class="stat-label">Days Protected</div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <a class="quick-link" id="linkHome">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>OBLIVION Homepage</span>
      </a>
      <a class="quick-link" id="linkNewTab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>Open New Tab</span>
        <span class="shortcut">Ctrl+T</span>
      </a>
    </div>

    <!-- Footer -->
    <div class="footer">
      Powered by <a href="https://oblivionsearch.com" id="linkSite">OblivionZone.com</a> &mdash; v2.0.0
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
