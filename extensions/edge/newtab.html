<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBLIVION Search</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="bg-glow"></div>

  <div class="main-container">
    <!-- Logo -->
    <div class="logo-section">
      <img src="icons/icon-128.png" alt="OBLIVION" class="logo-icon">
      <div class="logo-text">OBLIVION</div>
      <div class="logo-tagline">AI-POWERED PRIVATE SEARCH</div>
    </div>

    <!-- Search -->
    <div class="search-container">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search privately..." autofocus>
      <button class="search-submit" id="searchBtn" title="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <a class="quick-link" data-url="https://oblivionsearch.com/search?q=news+today&src=newtab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
          <path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/>
        </svg>
        News
      </a>
      <a class="quick-link" data-url="https://oblivionsearch.com/search?q=weather+forecast&src=newtab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
        </svg>
        Weather
      </a>
      <a class="quick-link" data-url="https://oblivionsearch.com/search?q=tech+news&src=newtab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Tech
      </a>
      <a class="quick-link" data-url="https://oblivionsearch.com/search?q=trending+topics&src=newtab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Trending
      </a>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="stat-item">
        <div class="stat-value" id="searchCount">0</div>
        <div class="stat-label">Private Searches</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="trackersBlocked">0</div>
        <div class="stat-label">No Trackers</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="daysSince">1</div>
        <div class="stat-label">Days Protected</div>
      </div>
    </div>

    <!-- Clock -->
    <div class="clock" id="clock"></div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://oblivionsearch.com" id="linkHome">OblivionZone.com</a> &mdash; Your searches, your business.
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
